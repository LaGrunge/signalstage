x-logging:
  &default-logging
  logging:
    driver: json-file
    options:
      max-size: 100M

services:
  server:
    image: judge0/judge0:latest
    volumes:
      - ./judge0.conf:/judge0.conf:ro
    ports:
      - "127.0.0.1:2358:2358"
    privileged: true
    <<: *default-logging
    restart: always
    networks:
      default: {}
      signalstage_net:
        aliases:
          - judge0-server

  worker:
    image: judge0/judge0:latest
    command: ["./scripts/workers"]
    volumes:
      - ./judge0.conf:/judge0.conf:ro
    privileged: true
    # Pin to a subset of CPUs: JVM/Go both size default thread pools (GC, JIT,
    # GOMAXPROCS) off the visible CPU count. Left unpinned on a many-core host
    # they spin up far more threads than MAX_PROCESSES_AND_OR_THREADS allows,
    # failing on pthread_create (EAGAIN) before user code even runs. cpuset
    # (not just a cpu quota) is what makes sched_getaffinity/
    # availableProcessors() actually report a small number. On a small
    # dedicated host (e.g. a 4-vCPU instance), also leave a couple of cores
    # free for postgres/api/frontend/judge0 server-db-redis rather than
    # claiming every core for the worker. Adjust the range to your instance
    # size - e.g. "0-3" on an 8+ vCPU box.
    cpuset: "2-3"
    <<: *default-logging
    restart: always

  db:
    image: postgres:16.2
    env_file: judge0.conf
    volumes:
      - data:/var/lib/postgresql/data/
    <<: *default-logging
    restart: always

  redis:
    image: redis:7.2.4
    command: [
      "bash", "-c",
      'docker-entrypoint.sh --appendonly no --requirepass "$$REDIS_PASSWORD"'
    ]
    env_file: judge0.conf
    <<: *default-logging
    restart: always

volumes:
  data:

networks:
  signalstage_net:
    external: true
    name: signalstage_net
