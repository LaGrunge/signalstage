x-logging:
  &default-logging
  logging:
    driver: json-file
    options:
      max-size: 100M

services:
  server:
    build: .
    image: signalstage-judge0:latest
    volumes:
      - ./judge0.conf:/judge0.conf:ro
    ports:
      - "127.0.0.1:2358:2358"
    privileged: true
    <<: *default-logging
    restart: always
    networks:
      default: {}
      signalstage_net:
        aliases:
          - judge0-server

  worker:
    build: .
    image: signalstage-judge0:latest
    command: ["./scripts/workers"]
    volumes:
      - ./judge0.conf:/judge0.conf:ro
    privileged: true
    # Pin to a subset of CPUs: JVM's default GC/JIT thread-pool sizing and
    # Go's GOMAXPROCS are both based on visible CPU count. Left unpinned on a
    # many-core host they size themselves off way more cores than they'll
    # actually get. On a small dedicated host (e.g. a 4-vCPU instance), also
    # leave a couple of cores free for postgres/api/frontend/judge0
    # server-db-redis rather than claiming every core for the worker. Adjust
    # the range to your instance size - e.g. "0-3" on an 8+ vCPU box.
    cpuset: "2-3"
    <<: *default-logging
    restart: always

  db:
    image: postgres:16.2
    env_file: judge0.conf
    volumes:
      - data:/var/lib/postgresql/data/
    <<: *default-logging
    restart: always

  redis:
    image: redis:7.2.4
    command: [
      "bash", "-c",
      'docker-entrypoint.sh --appendonly no --requirepass "$$REDIS_PASSWORD"'
    ]
    env_file: judge0.conf
    <<: *default-logging
    restart: always

volumes:
  data:

networks:
  signalstage_net:
    external: true
    name: signalstage_net
