server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass http://api:4000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # No trailing slash: @hocuspocus/provider connects to exactly "/collab"
    # (it does not append the room name to the path - that's negotiated over
    # the websocket protocol itself, via the `name`/`token` provider options).
    # A location ending in "/" only matches "/collab/..." and nginx 301s a
    # bare "/collab" request to add the slash - which breaks the websocket
    # upgrade handshake and makes the client spin in "connecting" forever.
    location /collab {
        proxy_pass http://api:1234;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    # Same no-trailing-slash reasoning as /collab above, applied preemptively:
    # the frontend always requests /lsp/<language> (never a bare /lsp), but
    # keep the pattern consistent so a bare /lsp request doesn't 301 instead
    # of 404ing cleanly.
    location /lsp {
        proxy_pass http://lsp:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    # SPA fallback: client-side routing (react-router) owns everything else.
    location / {
        try_files $uri /index.html;
    }
}
