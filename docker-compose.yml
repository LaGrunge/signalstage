services:
  postgres:
    image: postgres:16.2
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-signalstage}
      POSTGRES_USER: ${POSTGRES_USER:-signalstage}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    volumes:
      - signalstage_pgdata:/var/lib/postgresql/data
    restart: always

  api:
    build: ./server
    environment:
      PORT: 4000
      COLLAB_PORT: 1234
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-signalstage}
      POSTGRES_USER: ${POSTGRES_USER:-signalstage}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      JUDGE0_URL: http://judge0-server:2358
      JUDGE0_AUTH_HEADER: X-Judge0-Token
      JUDGE0_AUTH_TOKEN: ${JUDGE0_AUTH_TOKEN:?set JUDGE0_AUTH_TOKEN in .env, must match judge0/judge0.conf}
    depends_on:
      - postgres
    networks:
      default: {}
      signalstage_net: {}
    restart: always

  lsp:
    build: ./lsp
    # Language servers spawn per-connection (see lsp/bridge.js) and can be
    # memory-hungry, especially jdtls - cap the whole service so a handful of
    # concurrent interview sessions can't starve postgres/api/frontend/judge0
    # on this same small box. Raise if you expect more concurrent sessions.
    mem_limit: 3g
    restart: always

  frontend:
    build: ./frontend
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./frontend/.htpasswd:/etc/nginx/.htpasswd:ro
    depends_on:
      - api
      - lsp
    restart: always

volumes:
  signalstage_pgdata:

networks:
  signalstage_net:
    name: signalstage_net
